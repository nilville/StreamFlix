<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Clash Display (editorial/luxury), Plus Jakarta Sans (refined body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon-512.png') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <!-- ─── Favicons ────────────────────────────────────────── -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" sizes="512x512" href="favicon-512.png">
  <meta name="theme-color" content="#080A0F">

  <title>StreamFlix</title>
</head>

<body>

  <!-- ═══════════════ HEADER ══════════════════ -->
  <header class="site-header"
    style="padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between relative">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 sm:gap-3" style="text-decoration:none">
        <span class="logo-text text-2xl sm:text-3xl tracking-tight">StreamFlix</span>
        <span class="logo-dot"></span>
      </a>

      <!-- Nav (desktop) -->
      <nav class="hidden md:flex items-center gap-8">
        <a href="/" class="nav-link active">Movies</a>
        <a href="/series" class="nav-link">Series</a>
      </nav>

      <!-- Mobile nav + Search + Avatar -->
      <div class="flex items-center gap-2 sm:gap-4">
        <!-- Mobile hamburger (shows Movies / Series) -->
        <button id="mobile-menu-toggle"
          class="md:hidden inline-flex items-center justify-center w-9 h-9 rounded-lg border border-[var(--border-glass)] bg-[var(--bg-glass)] text-gray-300 hover:text-white hover:border-[var(--accent)] transition-colors touch-manipulation"
          aria-label="Open navigation" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round">
            <path d="M4 7h16" />
            <path d="M4 12h10" />
            <path d="M4 17h16" />
          </svg>
        </button>
        <button class="text-gray-500 hover:text-white transition-colors p-2 touch-manipulation" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </button>
        <div
          class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-700 ring-2 ring-white/10 cursor-pointer touch-manipulation">
        </div>
      </div>

      <!-- Mobile menu dropdown -->
      <div id="mobile-menu" class="md:hidden mobile-menu-panel absolute right-4 top-full mt-3">
        <a href="/" class="mobile-menu-item active">Movies</a>
        <a href="/series" class="mobile-menu-item">Series</a>
      </div>
    </div>
  </header>

  <!-- ═══════════════ MAIN ═══════════════════ -->
  <main class="relative max-w-7xl mx-auto px-4 sm:px-6 pb-16 sm:pb-24 pt-8 sm:pt-14 main-content">

    <!-- ambient glow -->
    <div class="hero-glow"></div>

    <!-- Section heading -->
    <div class="page-heading relative z-10 mb-6 sm:mb-10 flex items-end justify-between">
      <div>
        <p class="section-label mb-2">Curated for you</p>
        <h2 class="section-title">Trending <span style="color:var(--accent)">Now</span></h2>
      </div>
      <div>
        <a href="/all_movies" class="btn">View All Movies</a>
      </div>
    </div>

    <!-- ═══ MOVIE GRID ═══════════════════════ -->
    <div
      class="relative z-10 grid gap-4 sm:gap-6 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">

      {% for movie in movies %}
      <div class="card-scene cursor-pointer touch-manipulation" data-delay="{{ loop.index0 * 60 }}"
        data-title="{{ movie.title }}" data-poster="{{ movie.poster_path }}" data-rating="{{ movie.vote_average }}"
        data-date="{{ movie.release_date }}" data-overview="{{ movie.overview }}">
        <article class="movie-card">

          <!-- Poster -->
          <div class="poster-wrap">
            {% if movie.poster_path %}
            <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" alt="{{ movie.title }} poster"
              loading="lazy">
            {% else %}
            <!-- Fallback placeholder -->
            <div class="w-full h-full flex items-center justify-center" style="background:var(--bg-surface)">
              <svg class="w-12 h-12 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
              </svg>
            </div>
            {% endif %}

            <!-- Rating badge -->
            <div class="rating-badge">
              <svg class="star-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2l2.9 8.9H23l-7.4 5.4 2.8 8.6L12 19.7l-6.4 5.2 2.8-8.6L1 10.9h8.1z" />
              </svg>
              <span class="font-mono">{{ movie.vote_average }}</span>
            </div>
          </div>

          <!-- Body -->
          <div class="card-body">
            <h2 class="card-title">{{ movie.title }}</h2>

            <div class="card-meta">
              <span class="meta-chip">{{ movie.release_date }}</span>
            </div>

            <div class="card-divider"></div>

            <p class="card-overview">{{ movie.overview }}</p>

          </div>

        </article>
      </div>
      {% endfor %}

    </div>

  </main>

  <!-- ═══════════════ MODAL ════════════════════ -->
  <div id="detail-modal" class="detail-modal-overlay fixed inset-0 z-[200] flex items-center justify-center p-2 sm:p-4"
    style="background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);">
    <div
      class="detail-modal-box relative rounded-2xl sm:rounded-2xl max-w-2xl w-full max-h-[90vh] sm:max-h-[90vh] overflow-hidden">

      <!-- Close button -->
      <button type="button"
        class="modal-close-btn absolute top-5 right-5 z-20 w-11 h-11 flex items-center justify-center rounded-xl touch-manipulation"
        aria-label="Close" style="top: max(0.75rem, env(safe-area-inset-top));">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Scrollable content -->
      <div class="overflow-y-auto max-h-[90vh] min-h-0">
        <div class="flex flex-col md:flex-row gap-5 sm:gap-6 md:gap-8 p-4 sm:p-6 md:p-8">

          <!-- Poster -->
          <div class="flex-shrink-0 w-full md:w-72 max-w-[200px] sm:max-w-none mx-auto md:mx-0">
            <div class="modal-poster-wrap">
              <img id="modal-poster" src="" alt="" class="w-full h-full object-cover" />
            </div>
          </div>

          <!-- Details -->
          <div class="flex-1 min-w-0">
            <h1 id="modal-title"
              class="font-display font-extrabold text-xl sm:text-2xl md:text-4xl text-white leading-tight mb-3 sm:mb-4">
            </h1>

            <div class="flex items-center gap-2 sm:gap-3 mb-4 sm:mb-5 flex-wrap">
              <div
                class="modal-rating-badge flex items-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl">
                <svg class="w-5 h-5 fill-[var(--accent-warm)]" viewBox="0 0 24 24">
                  <path d="M12 2l2.9 8.9H23l-7.4 5.4 2.8 8.6L12 19.7l-6.4 5.2 2.8-8.6L1 10.9h8.1z" />
                </svg>
                <span id="modal-rating" class="font-mono font-semibold text-[var(--accent-warm)]"></span>
              </div>
              <span id="modal-date"
                class="font-mono text-xs sm:text-sm text-[var(--text-muted)] px-2.5 sm:px-3 py-1 sm:py-1.5 bg-[var(--bg-glass)] border border-[var(--border-glass)] rounded-lg"></span>
            </div>

            <div class="h-px bg-[var(--border-glass)] mb-4 sm:mb-5"></div>

            <div>
              <h3 class="font-mono text-[10px] sm:text-xs text-[var(--accent)] uppercase tracking-[0.2em] mb-2 sm:mb-3">
                Synopsis</h3>
              <p id="modal-overview" class="text-[var(--text-primary)] leading-relaxed text-sm sm:text-[0.95rem]"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>

</body>

</html>
